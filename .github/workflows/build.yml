name: Build Executables for Windows, Linux, and macOS

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller matplotlib pillow

      - name: Build executable (platform-specific args)
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            pyinstaller \
              --onefile \
              --hidden-import PIL.ImageTk \
              --collect-all matplotlib \
              --collect-all PIL \
              SimulEscal.py
          else
            pyinstaller --onefile SimulEscal.py
          fi
        shell: bash
        env:
          RUNNER_OS: ${{ runner.os }}

      - name: Rename executable for clarity
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            mv "dist/SimulEscal.exe" "dist/SimulEscal-windows.exe"
          elif [ "$RUNNER_OS" = "Linux" ]; then
            mv "dist/SimulEscal" "dist/SimulEscal-linux"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            mv "dist/SimulEscal" "dist/SimulEscal-macos"
          fi
        shell: bash
        env:
          RUNNER_OS: ${{ runner.os }}

      - name: Upload artifact (individual per OS)
        uses: actions/upload-artifact@v4
        with:
          name: SimulEscal-${{ matrix.os }}
          path: |
            dist/SimulEscal-windows.exe
            dist/SimulEscal-linux
            dist/SimulEscal-macos
